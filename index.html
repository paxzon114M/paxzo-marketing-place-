<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="css/main.css">
</head>
<body>

            <img src="logo.png" alt="PAXZO-MARKETING-PLACE logo">
            <span class="logo-text">PAXZO MARKETING PLACE</span>
        </div>
        <nav class="nav-tabs">
            <a href="#" id="homeTab" class="active">Home</a>
            <a href="#" id="productsTab">Products</a>

    </header>
    
    <div id="homeContent" class="content active">
        <h1>Welcome to PAXZO</h1>
        <p>Your premier marketing place for quality products!</p>

    <div id="productsContent" class="content">

            <div class="product-card">
                <img src="shoue2.png" alt="Running Shoe">
                <h3>Running Shoe</h3>
                <p>25,000 FRW</p>
                <a href="https://wa.me/250795535945?text=I%20want%20to%20buy%3A%0AProduct%3A%20Running%20Shoe%0APrice%3A%2025%2C000%20FRW%0AQuantity%3A%201" target="_blank">

            <!-- Casual Shoe -->
            <div class="product-card">
                <img src="shoe3.png" alt="Casual Shoe">
                <h3>Casual Shoe</h3>
                <p>10,000 FRW</p>
                <a href="https://wa.me/250795535945?text=I%20want%20to%20buy%3A%0AProduct%3A%20Casual%20Shoe%0APrice%3A%2010%2C000%20FRW%0AQuantity%3A%201" target="_blank">
                    <button class="buy-btn">Buy Now</button>
                </a>
            </div>
            
            <!-- Cotton T-Shirt -->
            <div class="product-card">
                <img src="t-shirt1.png" alt="Cotton T-Shirt">
                <h3>Cotton T-Shirt</h3>
                <p>8,000 FRW</p>
                <a href="https://wa.me/250795535945?text=I%20want%20to%20buy%3A%0AProduct%3A%20Cotton%20T-Shirt%0APrice%3A%208%2C000%20FRW%0AQuantity%3A%201" target="_blank">
                    <button class="buy-btn">Buy Now</button>
                </a>
            </div>

            <!-- Polo T-Shirt -->
            <div class="product-card">
                <img src="t-shirt2.png" alt="Polo T-Shirt">
                <h3>Polo T-Shirt</h3>
                <p>9,500 FRW</p>
                <a href="https://wa.me/250795535945?text=I%20want%20to%20buy%3A%0AProduct%3A%20Polo%20T-Shirt%0APrice%3A%209%2C500%20FRW%0AQuantity%3A%201" target="_blank">
                    <button class="buy-btn">Buy Now</button>

                <img src="t-shirt3.png" alt="Graphic T-Shirt">
                <h3>Graphic T-Shirt</h3>
                <p>30,000 FRW</p>
                <a href="https://wa.me/250795535945?text=I%20want%20to%20buy%3A%0AProduct%3A%20Graphic%20T-Shirt%0APrice%3A%2030%2C000%20FRW%0AQuantity%3A%201" target="_blank">
                    <button class="buy-btn">Buy Now</button>

        </div>
    </div>

    <script>
        const homeTab = document.getElementById('homeTab');
        const productsTab = document.getElementById('productsTab');
        const homeContent = document.getElementById('homeContent');
        const productsContent = document.getElementById('productsContent');
        
        homeTab.addEventListener('click', function(e) {
            e.preventDefault();
            homeContent.classList.add('active');
            productsContent.classList.remove('active');
            homeTab.classList.add('active');
            productsTab.classList.remove('active');
        });
        
        productsTab.addEventListener('click', function(e) {
            e.preventDefault();
            productsContent.classList.add('active');
            homeContent.classList.remove('active');
            productsTab.classList.add('active');
            homeTab.classList.remove('active');
        });
    </script>
</body>
</html>
